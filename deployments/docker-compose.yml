
services:
  gateway:
    build: ../services/gateway
    container_name: gateway
    restart: unless-stopped
    depends_on:
      postgres-user-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      ENV: ${ENV}
      TELEGRAM_HOST: ${TELEGRAM_HOST}
      LOCAL_BOT_TOKEN: ${LOCAL_BOT_TOKEN}
      ROOT_PATH: "/usr/local/src"
      CONFIG_PATH: "/configs/config.yaml"
      POSTGRES_HOST: postgres-user-db
      POSTGRES_USER_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USERS_USER}
      POSTGRES_PASSWORD: ${POSTGRES_USERS_PASSWORD}
      POSTGRES_DB: ${POSTGRES_USERS_DB}
      PGUSER: ${USERS_PGUSER}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      KEY: ${KEY}
      BOND_REPORT_SERVICE_HOST: bond-report-service
      BOND_REPORT_SERVICE_PORT: ${BOND_REPORT_SERVICE_PORT}
      TINKOFF_API_HOST: tinkoffapi_app
      TINKOFF_API_PORT: ${TINKOFF_API_PORT}
      KAFKA_EXTERNAL_PORT: ${KAFKA_EXTERNAL_PORT}
      KAFKA_HOST: kafka
    volumes:
      - ../services/gateway/configs/config.yaml:/usr/local/src/configs/config.yaml:ro
    ports:
      - "${GATEWAY_PORT}:8080"
    networks:
      - myapp_network


  postgres-user-db:
    image: postgres:latest
    container_name: user_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USERS_USER}
      POSTGRES_PASSWORD: ${POSTGRES_USERS_PASSWORD}
      POSTGRES_DB: ${POSTGRES_USERS_DB}
      PGUSER: ${USERS_PGUSER}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "${POSTGRES_USER_PORT}:5432"
    networks:
      - myapp_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $$POSTGRES_DB -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5
    

  redis:
    image: redis/redis-stack:latest
    container_name: redis-redis-stack
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT}:6379"
      - "${REDIS_STACK_PORT}:8001"
    volumes:
      - redis_data_a:/data
    networks:
      - myapp_network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "$$REDIS_PASSWORD", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5

  kafka:
    image: apache/kafka:4.1.1
    container_name: kafka
    restart: unless-stopped
    ports:
    - "${KAFKA_EXTERNAL_PORT}:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - myapp_network


  kafka-init:
    image: apache/kafka:4.1.1
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - myapp_network
    restart: "no"
    command:
      - bash
      - -c
      - |
        echo "Waiting for Kafka..."
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list >/dev/null 2>&1; do
          sleep 2
        done

        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic report.requested --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic report.generated --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic report.failed --partitions 1 --replication-factor 1

        echo "Kafka topics created"


  migrator:
    build: ../tools/migrator
    container_name: migrator
    restart: no
    depends_on:
      postgres-user-db:
        condition: service_healthy
    environment:
      ROOT_PATH: "/usr/local/src"
      CONFIG_PATH: "/config/config.yaml"
      MIGRATIONS_PATH: "/migrations"
      POSTGRES_HOST: postgres-user-db
      POSTGRES_PORT: 5432
      POSTGRES_PASSWORD: ${POSTGRES_USERS_PASSWORD}
      POSTGRES_DB: ${POSTGRES_USERS_DB}
      POSTGRES_USER: ${POSTGRES_USERS_USER}
      PGUSER: ${USERS_PGUSER}

    volumes:
      - ../migrations/gateway/postgres:/usr/local/src/migrations:ro
      - ../tools/migrator/config/config.yaml:/usr/local/src/config/config.yaml:ro
    networks:
      - myapp_network

  bond-report-service:
    build: ../services/bonds-report-service
    restart: unless-stopped
    stop_grace_period: 15s
    container_name: bond-report-service-app
    depends_on:
      postgres-service-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      ENV: ${ENV}
      ROOT_PATH: "/usr/local/src"
      CONFIG_PATH: "/configs/config.yaml"
      SBER_CONFIG_PATH: "/configs/sber.yaml"
      BOND_REPORT_SERVICE_PORT: ${BOND_REPORT_SERVICE_PORT}
      POSTGRES_HOST: postgres-service-db
      POSTGRES_SERVICE_PORT: 5432
      POSTGRES_USER: ${POSTGRES_SERVICE_USER}
      POSTGRES_PASSWORD: ${POSTGRES_SERVICE_PASSWORD}
      POSTGRES_DB: ${POSTGRES_SERVICE_DB}
      PGUSER: ${SERVICE_PGUSER}
      CBR_HOST: cbr_app
      CBR_PORT: ${CBR_PORT}
      TINKOFF_API_HOST: tinkoffApi_app
      TINKOFF_API_PORT: ${TINKOFF_API_PORT}
      MOEX_API_HOST: moex_app
      MOEX_API_PORT: ${MOEX_API_PORT}
      KAFKA_EXTERNAL_PORT: ${KAFKA_EXTERNAL_PORT}
      KAFKA_HOST: kafka
    volumes:
      - ../services/bonds-report-service/configs/config.yaml:/usr/local/src/configs/config.yaml:ro
      - ../services/bonds-report-service/configs/sber.yaml:/usr/local/src/configs/sber.yaml:ro
    ports:
      - "${BOND_REPORT_SERVICE_PORT}:8084"
    networks:
      - myapp_network

  postgres-service-db:
    image: postgres:latest
    container_name: service_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_SERVICE_USER}
      POSTGRES_PASSWORD: ${POSTGRES_SERVICE_PASSWORD}
      POSTGRES_DB: ${POSTGRES_SERVICE_DB}
      PGUSER: ${SERVICE_PGUSER}
    volumes:
      - postgres_service_data:/var/lib/postgresql
    ports:
      - "${POSTGRES_SERVICE_PORT}:5432"
    networks:
      - myapp_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $$POSTGRES_DB -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5

  cbr_app:
    build: ../services/cbr
    container_name: cbr_app
    restart: unless-stopped
    environment:
      ENV: ${ENV}
      ROOT_PATH: "/usr/local/src"
      CONFIG_PATH: "/configs/local.yaml"
      CBR_PORT: "${CBR_PORT}"
    volumes:
      - ../services/cbr/configs/local.yaml:/usr/local/src/configs/local.yaml:ro
    ports:
      - "${CBR_PORT}:8083"
    networks:
      - myapp_network

  tinkoffapi_app:
    build: ../services/tinkoffApi
    container_name: tinkoffapi_app
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      ENV: ${ENV}
      ROOT_PATH: "/usr/local/src"
      CONFIG_PATH: "/configs/local.yaml"
      TINKOFF_CONFIG_PATH: "/configs/tinkoffApiConfig.yaml"
      TINKOFF_API_PORT: ${TINKOFF_API_PORT}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      KEY: ${KEY}
    volumes:
      - ../services/tinkoffApi/configs/local.yaml:/usr/local/src/configs/local.yaml:ro
      - ../services/tinkoffApi/configs/tinkoffApiConfig.yaml:/usr/local/src/configs/tinkoffApiConfig.yaml:ro
    ports:
      - "${TINKOFF_API_PORT}:8082"
    networks:
      - myapp_network

  moex_app:
    build: ../services/moexApi
    container_name: moex_app
    restart: unless-stopped
    environment:
      ENV: ${ENV}
      ROOT_PATH: "/usr/local/src"
      CONFIG_PATH: "/configs/local.yaml"
      MOEX_API_PORT: ${MOEX_API_PORT}
    volumes:
      - ../services/moexApi/configs/local.yaml:/usr/local/src/configs/local.yaml:ro
    ports:
      - "${MOEX_API_PORT}:8083"
    networks:
      - myapp_network
  
  notification_service:
    build: ../services/notification-service
    container_name: notification-service
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped
    environment:
      ENV: ${ENV}
      TELEGRAM_HOST: ${TELEGRAM_HOST}
      LOCAL_BOT_TOKEN: ${LOCAL_BOT_TOKEN}
      NOTIFICATION_SERVICE_PORT: ${NOTIFICATION_SERVICE_PORT}
      NOTIFICATION_SERVICE_HOST: "localhost"
      KAFKA_EXTERNAL_PORT: ${KAFKA_EXTERNAL_PORT}
      KAFKA_HOST: kafka
    ports:
      - "${NOTIFICATION_SERVICE_PORT}:8085"
    networks:
      - myapp_network
  

networks:
  myapp_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data_a:
  postgres_service_data:
